<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CRS Engine Tester — FundHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        background: #0a0e17;
        color: #c8d6e5;
        min-height: 100vh;
      }

      .header {
        background: linear-gradient(135deg, #1a1f2e, #0d1117);
        border-bottom: 1px solid #30363d;
        padding: 20px 32px;
      }
      .header h1 {
        font-size: 20px;
        color: #58a6ff;
        font-weight: 600;
      }
      .header p {
        font-size: 13px;
        color: #8b949e;
        margin-top: 4px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: end;
        margin-bottom: 24px;
      }
      .control-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .control-group label {
        font-size: 12px;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      select,
      input[type="text"] {
        background: #161b22;
        border: 1px solid #30363d;
        color: #c9d1d9;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 14px;
      }
      select:focus,
      input:focus {
        outline: none;
        border-color: #58a6ff;
      }

      .btn {
        padding: 8px 20px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-primary {
        background: #238636;
        color: #fff;
      }
      .btn-primary:hover {
        background: #2ea043;
      }
      .btn-primary:disabled {
        background: #21262d;
        color: #484f58;
        cursor: not-allowed;
      }

      .status {
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 16px;
        font-size: 14px;
        display: none;
      }
      .status.loading {
        display: block;
        background: #0d1117;
        border: 1px solid #1f6feb;
        color: #58a6ff;
      }
      .status.error {
        display: block;
        background: #1c0d0d;
        border: 1px solid #f85149;
        color: #f85149;
      }
      .status.success {
        display: block;
        background: #0d1c0d;
        border: 1px solid #238636;
        color: #3fb950;
      }

      .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 800px) {
        .result-grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 16px;
      }
      .card h3 {
        font-size: 13px;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
        border-bottom: 1px solid #21262d;
        padding-bottom: 8px;
      }
      .card.full-width {
        grid-column: 1 / -1;
      }

      .outcome-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 600;
      }

      .metric {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        border-bottom: 1px solid #21262d;
      }
      .metric:last-child {
        border-bottom: none;
      }
      .metric-label {
        color: #8b949e;
        font-size: 13px;
      }
      .metric-value {
        color: #c9d1d9;
        font-size: 13px;
        font-weight: 500;
      }

      .reason-code {
        display: inline-block;
        background: #21262d;
        color: #c9d1d9;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        margin: 2px;
        font-family: monospace;
      }

      .finding {
        padding: 10px 0;
        border-bottom: 1px solid #21262d;
      }
      .finding:last-child {
        border-bottom: none;
      }
      .finding-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }
      .severity {
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 3px;
        font-weight: 600;
      }

      .letter-row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 13px;
      }

      .audit-step {
        display: flex;
        gap: 12px;
        padding: 4px 0;
        font-size: 12px;
      }
      .audit-stage {
        color: #58a6ff;
        min-width: 120px;
        font-family: monospace;
      }
      .audit-detail {
        color: #8b949e;
      }
      .audit-time {
        color: #3fb950;
        min-width: 40px;
        text-align: right;
      }

      .raw-toggle {
        background: none;
        border: 1px solid #30363d;
        color: #8b949e;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        margin-top: 8px;
      }
      .raw-toggle:hover {
        color: #c9d1d9;
        border-color: #58a6ff;
      }
      #rawJson {
        background: #0d1117;
        border: 1px solid #21262d;
        border-radius: 4px;
        padding: 12px;
        margin-top: 8px;
        font-size: 11px;
        overflow-x: auto;
        max-height: 400px;
        overflow-y: auto;
        display: none;
        color: #8b949e;
        white-space: pre;
        font-family: monospace;
      }

      .empty {
        color: #484f58;
        font-style: italic;
        font-size: 13px;
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>CRS Engine Tester</h1>
      <p>Test the UnderwriteIQ CRS engine against Stitch Credit sandbox data</p>
    </div>

    <div class="container">
      <div class="controls">
        <div class="control-group">
          <label>Test Profile</label>
          <select id="profile">
            <option value="tu">TU Only — BARBARA DOTY (725)</option>
            <option value="exp">EXP Only — WILLIE BOOZE (630)</option>
            <option value="efx">EFX Only — JOHN BIALOGLOW (636)</option>
            <option value="all" selected>All 3 Bureaus Combined</option>
            <option value="tu_exp">TU + EXP (2 bureaus)</option>
            <option value="custom">Custom JSON (paste below)</option>
          </select>
        </div>
        <div class="control-group">
          <label>Submitted Name</label>
          <input type="text" id="name" value="BARBARA DOTY" />
        </div>
        <div class="control-group">
          <label>Email</label>
          <input type="text" id="email" value="test@fundhub.ai" />
        </div>
        <div class="control-group" style="align-self: end">
          <button class="btn btn-primary" id="runBtn">Run Analysis</button>
        </div>
      </div>

      <textarea
        id="customJson"
        style="
          display: none;
          width: 100%;
          height: 150px;
          background: #161b22;
          border: 1px solid #30363d;
          color: #c9d1d9;
          padding: 12px;
          border-radius: 6px;
          font-size: 12px;
          font-family: monospace;
          margin-bottom: 16px;
        "
        placeholder='{"rawResponses": [...], "formData": {...}}'
      ></textarea>

      <div class="status" id="status"></div>

      <div id="results"></div>
    </div>

    <script>
      // Sandbox data cache
      let sandboxData = { tu: null, exp: null, efx: null };

      const API_BASE = window.location.origin;
      const ENDPOINT = API_BASE + "/api/lite/crs-analyze";

      document.getElementById("profile").addEventListener("change", function () {
        document.getElementById("customJson").style.display =
          this.value === "custom" ? "block" : "none";
        const names = {
          tu: "BARBARA DOTY",
          exp: "WILLIE BOOZE",
          efx: "JOHN BIALOGLOW",
          all: "BARBARA DOTY",
          tu_exp: "BARBARA DOTY"
        };
        if (names[this.value]) document.getElementById("name").value = names[this.value];
      });

      document.getElementById("runBtn").addEventListener("click", runTest);

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function setStatus(type, text) {
        const el = document.getElementById("status");
        el.className = "status " + type;
        el.textContent = text;
      }

      async function runTest() {
        const btn = document.getElementById("runBtn");
        const resultsEl = document.getElementById("results");
        const profile = document.getElementById("profile").value;
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;

        btn.disabled = true;
        setStatus("loading", "Running CRS engine...");
        resultsEl.textContent = "";

        let body;
        if (profile === "custom") {
          try {
            body = JSON.parse(document.getElementById("customJson").value);
          } catch (e) {
            setStatus("error", "Invalid JSON: " + e.message);
            btn.disabled = false;
            return;
          }
        } else {
          if (!sandboxData.tu) {
            setStatus("loading", "Loading sandbox data...");
            try {
              const resp = await fetch("/api/lite/crs-sandbox-data");
              if (!resp.ok) throw new Error("Sandbox data endpoint not available");
              const all = await resp.json();
              sandboxData = all;
            } catch (e) {
              if (window.__SANDBOX_TU) {
                sandboxData = {
                  tu: window.__SANDBOX_TU,
                  exp: window.__SANDBOX_EXP,
                  efx: window.__SANDBOX_EFX
                };
              } else {
                setStatus(
                  "error",
                  'Sandbox data not available. Use "Custom JSON" mode and paste raw CRS responses.'
                );
                btn.disabled = false;
                return;
              }
            }
            setStatus("loading", "Running CRS engine...");
          }

          const responses = {
            tu: [sandboxData.tu],
            exp: [sandboxData.exp],
            efx: [sandboxData.efx],
            all: [sandboxData.tu, sandboxData.exp, sandboxData.efx],
            tu_exp: [sandboxData.tu, sandboxData.exp]
          };

          body = { rawResponses: responses[profile], formData: { name: name, email: email } };
        }

        try {
          const start = Date.now();
          const resp = await fetch(ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          const elapsed = Date.now() - start;
          const data = await resp.json();

          if (!resp.ok || !data.ok) {
            setStatus(
              "error",
              "Error (" + resp.status + "): " + (data.error || data.message || "Unknown error")
            );
            btn.disabled = false;
            return;
          }

          const engineMs =
            data.audit && data.audit.pipeline
              ? data.audit.pipeline.reduce(function (s, p) {
                  return s + (p.durationMs || 0);
                }, 0)
              : 0;
          setStatus(
            "success",
            data.outcome + " — " + elapsed + "ms round-trip (engine: " + engineMs + "ms)"
          );
          renderResults(data);
        } catch (e) {
          setStatus("error", "Request failed: " + e.message);
        }

        btn.disabled = false;
      }

      function renderResults(d) {
        var el = document.getElementById("results");
        // Clear previous
        while (el.firstChild) el.removeChild(el.firstChild);

        var grid = document.createElement("div");
        grid.className = "result-grid";

        // -- Decision card --
        grid.appendChild(
          buildCard("Decision", false, function (content) {
            var badge = document.createElement("span");
            badge.className = "outcome-badge";
            badge.style.cssText = getOutcomeStyle(d.outcome);
            badge.textContent = d.outcome;
            var badgeWrap = document.createElement("div");
            badgeWrap.style.marginBottom = "12px";
            badgeWrap.appendChild(badge);
            content.appendChild(badgeWrap);

            addMetric(content, "Label", d.decision_label);
            addMetric(content, "Confidence", d.confidence);
            addMetric(content, "Explanation", d.decision_explanation);

            var codesDiv = document.createElement("div");
            codesDiv.style.marginTop = "10px";
            (d.reason_codes || []).forEach(function (c) {
              var span = document.createElement("span");
              span.className = "reason-code";
              span.textContent = c;
              codesDiv.appendChild(span);
            });
            content.appendChild(codesDiv);
          })
        );

        // -- Consumer Signals card --
        grid.appendChild(
          buildCard("Consumer Signals", false, function (content) {
            var normStage = findStage(d, "normalize");
            var scoreMatch = findLog(d, "medianScore");
            addMetric(content, "Median Score", scoreMatch || "—");
            addMetric(content, "Bureaus", normStage ? normStage.inputBureaus : "—");
            addMetric(content, "Tradelines", normStage ? normStage.tradelinesFound : "—");

            var summary = document.createElement("div");
            summary.style.cssText = "margin-top:10px;font-size:13px;line-height:1.6;color:#c9d1d9";
            summary.textContent = d.consumer_summary;
            content.appendChild(summary);

            var bizSummary = document.createElement("div");
            bizSummary.style.cssText =
              "margin-top:6px;font-size:13px;line-height:1.6;color:#8b949e";
            bizSummary.textContent = d.business_summary;
            content.appendChild(bizSummary);
          })
        );

        // -- Pre-Approvals card --
        grid.appendChild(
          buildCard("Pre-Approvals", false, function (content) {
            var pa = d.preapprovals || {};
            addMetric(
              content,
              "Personal Card",
              "$" + ((pa.personalCard && pa.personalCard.final) || 0).toLocaleString()
            );
            addMetric(
              content,
              "Personal Loan",
              "$" + ((pa.personalLoan && pa.personalLoan.final) || 0).toLocaleString()
            );
            addMetric(
              content,
              "Business",
              "$" + ((pa.business && pa.business.final) || 0).toLocaleString()
            );

            var totalRow = addMetric(
              content,
              "Total Combined",
              "$" + (pa.totalCombined || 0).toLocaleString()
            );
            totalRow.style.fontWeight = "700";

            addMetric(content, "Customer Safe", pa.customerSafe ? "Yes" : "No");
            addMetric(content, "Confidence Band", pa.confidenceBand || "—");
            addMetric(content, "Suppressed", pa.suppressedByOutcome ? "Yes" : "No");
          })
        );

        // -- Documents card --
        grid.appendChild(
          buildCard(
            "Documents (" + ((d.documents && d.documents.package) || "") + ")",
            false,
            function (content) {
              var docs = d.documents || {};
              addMetric(content, "Package", docs.package);
              addMetric(content, "Letters", (docs.letters || []).length);
              addMetric(content, "Summary Docs", (docs.summaryDocuments || []).length);

              (docs.letters || []).forEach(function (l) {
                var row = document.createElement("div");
                row.className = "letter-row";
                var typeSpan = document.createElement("span");
                typeSpan.style.color = "#c9d1d9";
                typeSpan.textContent = l.type + (l.round ? " R" + l.round : "");
                var bureauSpan = document.createElement("span");
                bureauSpan.style.color = "#8b949e";
                bureauSpan.textContent = l.bureau;
                row.appendChild(typeSpan);
                row.appendChild(bureauSpan);
                content.appendChild(row);
              });

              if (docs.summary) {
                var summ = document.createElement("div");
                summ.style.cssText = "margin-top:6px;font-size:12px;color:#8b949e";
                summ.textContent = docs.summary;
                content.appendChild(summ);
              }
            }
          )
        );

        // -- Findings card --
        var findingCount = (d.optimization_findings || []).length;
        grid.appendChild(
          buildCard("Optimization Findings (" + findingCount + ")", true, function (content) {
            if (!findingCount) {
              var empty = document.createElement("div");
              empty.className = "empty";
              empty.textContent = "No findings";
              content.appendChild(empty);
              return;
            }
            (d.optimization_findings || []).forEach(function (f) {
              var div = document.createElement("div");
              div.className = "finding";

              var header = document.createElement("div");
              header.className = "finding-header";
              var title = document.createElement("span");
              title.style.cssText = "font-size:13px;color:#c9d1d9";
              title.textContent = f.plainEnglishProblem;
              var sev = document.createElement("span");
              sev.className = "severity";
              sev.textContent = f.severity;
              sev.style.cssText = getSeverityStyle(f.severity);
              header.appendChild(title);
              header.appendChild(sev);

              var action = document.createElement("div");
              action.style.cssText = "font-size:12px;color:#8b949e;margin-top:4px";
              action.textContent = f.whatToDoNext;

              div.appendChild(header);
              div.appendChild(action);
              content.appendChild(div);
            });
          })
        );

        // -- Suggestions card --
        grid.appendChild(
          buildCard("Suggestions", true, function (content) {
            ((d.suggestions && d.suggestions.layers) || []).forEach(function (layer) {
              var layerDiv = document.createElement("div");
              layerDiv.style.marginBottom = "12px";

              var layerTitle = document.createElement("div");
              layerTitle.style.cssText =
                "font-size:13px;color:#58a6ff;font-weight:600;margin-bottom:6px";
              layerTitle.textContent = layer.name;
              layerDiv.appendChild(layerTitle);

              if (!layer.items.length) {
                var none = document.createElement("div");
                none.style.cssText = "padding:4px 0 4px 12px;font-size:12px;color:#484f58";
                none.textContent = "None";
                layerDiv.appendChild(none);
              } else {
                layer.items.forEach(function (item) {
                  var itemDiv = document.createElement("div");
                  itemDiv.style.cssText =
                    "padding:4px 0 4px 12px;border-left:2px solid #30363d;margin-bottom:4px";
                  var itemTitle = document.createElement("div");
                  itemTitle.style.cssText = "font-size:13px;color:#c9d1d9";
                  itemTitle.textContent = item.title;
                  var itemDesc = document.createElement("div");
                  itemDesc.style.cssText = "font-size:12px;color:#8b949e";
                  itemDesc.textContent = item.description;
                  itemDiv.appendChild(itemTitle);
                  itemDiv.appendChild(itemDesc);
                  layerDiv.appendChild(itemDiv);
                });
              }
              content.appendChild(layerDiv);
            });
          })
        );

        // -- Cards/Tags card --
        grid.appendChild(
          buildCard("Cards / Tags", false, function (content) {
            (d.cards || []).forEach(function (c) {
              var span = document.createElement("span");
              span.className = "reason-code";
              span.textContent = c;
              content.appendChild(span);
            });
          })
        );

        // -- Redirect card --
        grid.appendChild(
          buildCard("Redirect", false, function (content) {
            addMetric(content, "Result Type", d.redirect && d.redirect.resultType);
            addMetric(content, "Ref ID", d.redirect && d.redirect.refId);
            addMetric(content, "URL", d.redirect && d.redirect.resultUrl);
          })
        );

        // -- Audit card --
        grid.appendChild(
          buildCard("Audit Trail", true, function (content) {
            ((d.audit && d.audit.pipeline) || []).forEach(function (p) {
              var step = document.createElement("div");
              step.className = "audit-step";

              var time = document.createElement("span");
              time.className = "audit-time";
              time.textContent = p.durationMs + "ms";

              var stage = document.createElement("span");
              stage.className = "audit-stage";
              stage.textContent = p.stage;

              var detail = document.createElement("span");
              detail.className = "audit-detail";
              detail.textContent = Object.keys(p)
                .filter(function (k) {
                  return k !== "stage" && k !== "durationMs";
                })
                .map(function (k) {
                  return k + "=" + p[k];
                })
                .join(", ");

              step.appendChild(time);
              step.appendChild(stage);
              step.appendChild(detail);
              content.appendChild(step);
            });

            var logDiv = document.createElement("div");
            logDiv.style.cssText = "margin-top:12px;border-top:1px solid #21262d;padding-top:8px";
            ((d.audit && d.audit.decisionsLog) || []).forEach(function (l) {
              var line = document.createElement("div");
              line.style.cssText =
                "font-size:12px;color:#8b949e;padding:2px 0;font-family:monospace";
              line.textContent = l;
              logDiv.appendChild(line);
            });
            content.appendChild(logDiv);
          })
        );

        // -- Raw JSON card --
        grid.appendChild(
          buildCard("Raw Response", true, function (content) {
            var toggleBtn = document.createElement("button");
            toggleBtn.className = "raw-toggle";
            toggleBtn.textContent = "Toggle Raw JSON";
            content.appendChild(toggleBtn);

            var pre = document.createElement("pre");
            pre.id = "rawJson";
            pre.textContent = JSON.stringify(d, null, 2);
            content.appendChild(pre);

            toggleBtn.addEventListener("click", function () {
              pre.style.display = pre.style.display === "none" ? "block" : "none";
            });
          })
        );

        el.appendChild(grid);
      }

      // Helpers
      function buildCard(title, fullWidth, buildFn) {
        var card = document.createElement("div");
        card.className = "card" + (fullWidth ? " full-width" : "");
        var h3 = document.createElement("h3");
        h3.textContent = title;
        card.appendChild(h3);
        var content = document.createElement("div");
        buildFn(content);
        card.appendChild(content);
        return card;
      }

      function addMetric(parent, label, value) {
        var row = document.createElement("div");
        row.className = "metric";
        var l = document.createElement("span");
        l.className = "metric-label";
        l.textContent = label;
        var v = document.createElement("span");
        v.className = "metric-value";
        v.textContent = value || "—";
        if (label === "URL") v.style.cssText = "font-size:11px;word-break:break-all";
        if (label === "Ref ID") v.style.fontFamily = "monospace";
        row.appendChild(l);
        row.appendChild(v);
        parent.appendChild(row);
        return row;
      }

      function findStage(d, name) {
        if (!d.audit || !d.audit.pipeline) return null;
        return d.audit.pipeline.find(function (p) {
          return p.stage === name;
        });
      }

      function findLog(d, keyword) {
        if (!d.audit || !d.audit.decisionsLog) return null;
        var line = d.audit.decisionsLog.find(function (l) {
          return l.indexOf(keyword) !== -1;
        });
        if (!line) return null;
        var match = line.match(new RegExp(keyword + "=(\\S+)"));
        return match ? match[1] : null;
      }

      function getOutcomeStyle(outcome) {
        var styles = {
          REPAIR: "background:#f8514922;color:#f85149;border:1px solid #f8514944",
          CONDITIONAL_APPROVAL: "background:#d2992222;color:#d29922;border:1px solid #d2992244",
          FULL_STACK_APPROVAL: "background:#23863622;color:#3fb950;border:1px solid #23863644",
          PREMIUM_STACK: "background:#23863622;color:#3fb950;border:1px solid #23863644",
          MANUAL_REVIEW: "background:#1f6feb22;color:#58a6ff;border:1px solid #1f6feb44",
          FRAUD_HOLD: "background:#f8514944;color:#ff7b72;border:1px solid #f85149"
        };
        return styles[outcome] || "background:#21262d;color:#c9d1d9;border:1px solid #30363d";
      }

      function getSeverityStyle(sev) {
        var styles = {
          critical: "background:#f8514933;color:#f85149",
          high: "background:#d2992233;color:#d29922",
          medium: "background:#1f6feb33;color:#58a6ff",
          low: "background:#23863633;color:#3fb950"
        };
        return (
          (styles[sev] || "") + ";font-size:11px;padding:2px 6px;border-radius:3px;font-weight:600"
        );
      }
    </script>
  </body>
